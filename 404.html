<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Summit Coatings LLC</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <meta name="theme-color" content="#081428">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--navy-dark);
      padding: 40px 24px;
    }
    .nf-inner { max-width: 600px; }
    .nf-code {
      font-family: var(--font-heading);
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }
    .nf-inner h1 { color: var(--white); margin: 8px 0 14px; }
    .nf-inner p { color: var(--text-light); margin: 0 auto 28px; }
    .nf-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <div class="nf-inner">
      <div class="nf-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
      <div class="nf-btns">
        <a href="index.html" class="btn btn--gold">Back to Home</a>
        <a href="tel:+12082439342" class="btn btn--outline">Call for a Free Quote</a>
      </div>
    </div>
  </div>
</body>
</html>
